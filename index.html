<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>TaskFlow — Modern To-Do List</title>
    <meta
      name="description"
      content="A beautiful, modern to-do list app to help you stay organized and productive. Tasks are saved automatically in your browser."
    />

    <!-- Google Fonts: Inter for clean, modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to our external stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ========================================================
         BACKGROUND DECORATION
         Subtle animated blobs to give the page visual depth
    ======================================================== -->
    <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

    <!-- ========================================================
         MAIN APP CONTAINER
         Everything lives inside this centered card
    ======================================================== -->
    <main class="app-container" role="main">

      <!-- ---- APP HEADER ---- -->
      <header class="app-header">
        <!-- App icon / logo -->
        <div class="app-logo" aria-hidden="true">✦</div>

        <div class="app-title-group">
          <h1 class="app-title">TaskFlow</h1>
          <p class="app-subtitle">Stay organized, stay ahead</p>
        </div>

        <!-- Live task counters shown in the header -->
        <div class="task-stats" aria-live="polite" aria-atomic="true">
          <div class="stat-pill" id="stat-total" title="Total tasks">
            <span class="stat-number" id="stat-total-num">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-pill stat-pill--done" id="stat-done" title="Completed tasks">
            <span class="stat-number" id="stat-done-num">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>
      </header>

      <!-- ---- PROGRESS BAR ---- -->
      <!-- Shows percentage of completed tasks visually -->
      <div class="progress-bar-wrap" aria-label="Task completion progress">
        <div class="progress-bar" id="progress-bar" role="progressbar"
             aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>

      <!-- ---- TASK INPUT SECTION ---- -->
      <section class="input-section" aria-label="Add a new task">
        <form class="input-form" id="task-form" novalidate>
          <!-- Text input where the user types a new task -->
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="What needs to be done?"
            maxlength="120"
            autocomplete="off"
            aria-label="New task description"
            required
          />

          <!-- Button to submit / add the task -->
          <button type="submit" class="add-btn" id="add-btn" aria-label="Add task">
            <span class="add-btn__icon" aria-hidden="true">+</span>
            <span class="add-btn__text">Add</span>
          </button>
        </form>

        <!-- Character counter that updates as user types -->
        <div class="char-counter" id="char-counter" aria-live="polite">
          <span id="char-count">0</span>/120
        </div>
      </section>

      <!-- ---- FILTER TABS ---- -->
      <!-- Let the user switch between All / Active / Completed views -->
      <nav class="filter-tabs" aria-label="Filter tasks">
        <button class="filter-tab filter-tab--active" data-filter="all" id="filter-all">
          All
        </button>
        <button class="filter-tab" data-filter="active" id="filter-active">
          Active
        </button>
        <button class="filter-tab" data-filter="completed" id="filter-completed">
          Completed
        </button>
      </nav>

      <!-- ---- TASK LIST ---- -->
      <!-- Tasks are dynamically injected here by script.js -->
      <section aria-label="Task list">
        <ul class="task-list" id="task-list" aria-live="polite">
          <!-- Tasks rendered here by JavaScript -->
        </ul>

        <!-- Empty-state illustration shown when there are no tasks to display -->
        <div class="empty-state" id="empty-state" aria-hidden="true">
          <div class="empty-state__icon">🎯</div>
          <p class="empty-state__text">No tasks here yet!</p>
          <p class="empty-state__hint">Add a task above to get started</p>
        </div>
      </section>

      <!-- ---- FOOTER ACTIONS ---- -->
      <!-- Bulk actions like clearing completed tasks -->
      <footer class="app-footer" id="app-footer">
        <span class="footer-count" id="footer-remaining">0 tasks remaining</span>
        <button class="clear-btn" id="clear-completed-btn" aria-label="Clear all completed tasks">
          Clear completed
        </button>
      </footer>

    </main><!-- /.app-container -->

    <!-- Link to our external JavaScript file (deferred so HTML loads first) -->
    <script src="script.js" defer></script>
  </body>
</html>
